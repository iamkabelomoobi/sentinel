upstream sentinel_api {
    server 127.0.0.1:4000;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name api.sentinel.bbbsoftware.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.sentinel.bbbsoftware.co.za;

    ssl_certificate /etc/letsencrypt/live/api.sentinel.bbbsoftware.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sentinel.bbbsoftware.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Limits
    client_max_body_size 10m;

    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;

        proxy_set_header Host api.sentinel.bbbsoftware.co.za;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
        proxy_read_timeout 240s;
    }

    access_log /var/log/nginx/sentinel_access.log;
    error_log  /var/log/nginx/sentinel_error.log warn;
}

# Catch-all to drop unknown Host headers
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/api.sentinel.bbbsoftware.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sentinel.bbbsoftware.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 444;
}
