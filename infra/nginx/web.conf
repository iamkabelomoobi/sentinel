upstream sentinel_web {
    server 127.0.0.1:3000;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

server {
    listen 80;
    server_name app.sentinel.bbbsoftware.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.sentinel.bbbsoftware.co.za;

    ssl_certificate /etc/letsencrypt/live/api.sentinel.bbbsoftware.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sentinel.bbbsoftware.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy — tune this per your app's needs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.sentinel.bbbsoftware.co.za; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

    # Limits
    client_max_body_size 10m;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_vary on;

    location / {
        limit_req zone=web_limit burst=50 nodelay;

        proxy_pass http://sentinel_web;
        proxy_http_version 1.1;

        proxy_set_header Host app.sentinel.bbbsoftware.co.za;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
        proxy_read_timeout 240s;
    }

    # Static asset caching (Next.js default path)
    location /_next/static {
        proxy_pass http://sentinel_web;
        proxy_http_version 1.1;
        proxy_set_header Host app.sentinel.bbbsoftware.co.za;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    access_log /var/log/nginx/sentinel_web_access.log;
    error_log  /var/log/nginx/sentinel_web_error.log warn;
}
