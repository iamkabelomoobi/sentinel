services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: sentinel-api-prod
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env.production
    environment:
      NODE_ENV: production
      PM2_MACHINE_NAME: sentinel-api
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.sentinel.bbbsoftware.co.za
    container_name: sentinel-web-prod
    restart: unless-stopped
    env_file:
      - ../../apps/web/.env.production
    environment:
      NODE_ENV: production
      PM2_MACHINE_NAME: sentinel-web
    ports:
      - "3000:3000"
    depends_on:
      - api
